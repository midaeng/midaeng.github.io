name: Deploy Hugo
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # 테마를 정상적으로 가져오기 위해 필수
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          # 최신 버전(latest) 대신 안정적인 버전을 명시합니다.
          hugo-version: '0.140.0' 
          extended: true
      - name: Build
        # 로그에서 확인된 대로 루트 경로를 테마로 사용하여 빌드합니다.
        run: hugo --minify --themesDir . -t .
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
