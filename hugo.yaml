baseURL: "https://midaeng.github.io/midaeng-hugo/"
title: "BangLab"
languageCode: ko-kr
hasCJKLanguage: true

# 1. 테마 및 경로 설정
# 현재 루트에 layouts가 있어도 PaperMod를 기반으로 작동하게 합니다.
theme: "PaperMod"
assetDir: "assets"

# 2. 출력 설정 (RSS 충돌 방지 및 HTML 우선)
outputs:
  home: ["HTML", "RSS"]
  page: ["HTML"]
  section: ["HTML"]
  taxonomy: ["HTML"]
  term: ["HTML"]

# 3. 상세 파라미터 (Jekyll에서 쓰던 변수들을 Hugo용으로 통합)
params:
  author: "Mijin Baek"
  bio: "Agile Coach | Mom | Life Explorer" # 소개 문구를 수정해 보세요!
  picture: "images/profile.png" # static/images/profile.png 경로 기준
  
  # 소셜 미디어 링크
  facebook: "https://facebook.com/agile.bella.coach"
  instagram: "https://instagram.com/_midaeng"
  youtube: "https://www.youtube.com/@MijinBaek"
  linkedin: "https://www.linkedin.com/in/midaeng"
  brunch: "https://brunch.co.kr/@banglab"

  # 디자인 설정
  defaultTheme: light
  assets:
    disableFingerprinting: true

# 4. 상단 메뉴 설정
menu:
  main:
    - name: Home
      url: "/"
      weight: 10
    - name: Work
      url: "/posts"
      weight: 20
    - name: About
      url: "/about"
      weight: 30