<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    {{ $style := resources.Get "css/main.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $style.Permalink }}">
</head>
<body>
<div class="site-wrapper list-wrapper">
    <nav class="nav" style="text-align: center; padding: 40px 0;">
    <ul style="list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px;">
        <li><a href="{{ .Site.BaseURL }}" style="text-decoration: none; color: #333; font-weight: 600; letter-spacing: 1px;">HOME</a></li>
        <li><a href="{{ .Site.BaseURL }}work" style="text-decoration: none; color: #333; border-bottom: 2px solid #333; padding-bottom: 5px;">ARTICLES</a></li>
    </ul>
</nav>
    
    <main class="list-container">
        {{ range (.Pages.GroupByDate "2006") }}
        <div class="year-group">
            <h2 class="year-label">{{ .Key }}</h2>
            <ul class="article-list">
                {{ range .Pages }}
                <li class="article-item">
                    <a href="{{ .Permalink }}" class="article-title">{{ .Title }}</a>
                    <span class="article-date">{{ .Date.Format "2 January" }}</span>
                </li>
                {{ end }}
            </ul>
        </div>
        {{ end }}
    </main>
</div>
</body>
</html>
