<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About | {{ .Site.Title }}</title>
    {{ $style := resources.Get "css/main.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $style.Permalink }}">
</head>
<body>
<div class="site-wrapper">
    <nav class="nav" style="padding: 40px 0; text-align: center;">
        <ul><li style="list-style: none;"><a href="{{ .Site.BaseURL }}" style="text-decoration: none; color: #333; font-weight: 600;">HOME</a></li></ul>
    </nav>
    
    <article class="about-page-container">
        <h1 class="about-title">{{ .Title }}</h1>
        <div class="about-content">
            {{ .Content }}
        </div>
    </article>
</div>
</body>
</html>
